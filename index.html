<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Modserver 3 mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 300px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .panel label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }

    .panel input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1d1d1d;
      color: white;
    }

    .panel input[type="checkbox"] {
      width: auto;
      margin-right: 6px;
    }

    .panel button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
    }

    .coords-box {
      margin-top: 10px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      line-height: 1.5;
    }

    .region-label {
      color: white;
      font-size: 17px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.75),
        -1px -1px 0 rgba(0,0,0,0.75),
        1px -1px 0 rgba(0,0,0,0.75),
        -1px 1px 0 rgba(0,0,0,0.75);
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .pixel-marker {
      width: 18px;
      height: 18px;
      position: relative;
      image-rendering: pixelated;
    }

    .pixel-marker::before {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 2px solid #111;
      box-shadow:
        inset -2px -2px 0 rgba(0,0,0,0.35),
        inset 2px 2px 0 rgba(255,255,255,0.12);
    }

    .pixel-marker::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: -6px;
      width: 6px;
      height: 6px;
      background: inherit;
      border-left: 2px solid #111;
      border-bottom: 2px solid #111;
      transform: rotate(-45deg);
      box-sizing: border-box;
    }

    .marker-city {
      background: #c1121f;
    }

    .marker-structure {
      background: #163a70;
    }

    /* ===== MOBILE MENU + ZOZNAM ===== */
    .panel {
      display: none;
    }

    .panel.open {
      display: block;
    }

    .mobile-panel-button {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1200;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .list-button {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1200;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .list-panel {
      display: none;
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1100;
      width: 330px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      background: rgba(20,20,20,0.95);
      color: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .list-panel.open {
      display: block;
    }

    .list-panel h2 {
      margin: 28px 0 10px 0;
      font-size: 18px;
    }

    .list-panel details {
      margin: 8px 0;
    }

    .list-panel summary {
      cursor: pointer;
      font-weight: bold;
    }

    .list-item {
      margin-left: 16px;
      padding: 4px 0;
      cursor: pointer;
      color: #9fd0ff;
    }

    .list-item:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .panel {
        width: calc(100% - 24px);
        left: 12px;
        right: 12px;
      }

      .list-panel {
        width: calc(100% - 24px);
        left: 12px;
        right: 12px;
      }
    }

  </style>
</head>

    // ===== MAPA / TILES =====
    const imageWidth = 15104;
    const imageHeight = 15104;

    const tileSize = 256;

    // Skutočná mapa má 15008 px, potom si pridal čierny okraj 48 px z každej strany.
    const mapContentWidth = 15008;
    const mapContentHeight = 15008;
    const mapPadding = 48;

    const mcMinX = -7504;
    const mcMaxX = 7503;
    const mcMinZ = -7504;
    const mcMaxZ = 7503;

    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      zoomControl: false,
      minZoom: -5,
      maxZoom: 3,
      zoomSnap: 0.25,
      zoomDelta: 0.25,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    // ===== MULTI-ZOOM TILES =====
    // Priečinky musia byť:
    // tiles/z0, tiles/z1, tiles/z2, tiles/z3, tiles/z4
    const zoomLevels = [
      { folder: "z0", size: 1024, count: 4 },
      { folder: "z1", size: 2048, count: 8 },
      { folder: "z2", size: 4096, count: 16 },
      { folder: "z3", size: 8192, count: 32 },
      { folder: "z4", size: 15104, count: 59 }
    ];

    let currentTileLayer = null;
    let currentZoomFolder = null;

    function getBestTileLevel() {
      const z = map.getZoom();

      if (z < -3.25) return zoomLevels[0]; // z0, 1024 px
      if (z < -2.25) return zoomLevels[1]; // z1, 2048 px
      if (z < -1.25) return zoomLevels[2]; // z2, 4096 px
      if (z < -0.25) return zoomLevels[3]; // z3, 8192 px
      return zoomLevels[4];                // z4, plná mapa
    }

    function loadTileLevel(level) {
      if (currentZoomFolder === level.folder) return;

      if (currentTileLayer) {
        map.removeLayer(currentTileLayer);
      }

      currentTileLayer = L.layerGroup();

      const scale = imageWidth / level.size;
      const visualTileSize = tileSize * scale;

      for (let y = 0; y < level.count; y++) {
        for (let x = 0; x < level.count; x++) {
          const top = y * visualTileSize;
          const left = x * visualTileSize;
          const bottom = top + visualTileSize;
          const right = left + visualTileSize;

          L.imageOverlay(
            `tiles/${level.folder}/${x}_${level.count - 1 - y}.jpg`,
            [[top, left], [bottom, right]]
          ).addTo(currentTileLayer);
        }
      }

      currentTileLayer.addTo(map);
      currentZoomFolder = level.folder;
    }

    map.fitBounds(bounds);
    loadTileLevel(getBestTileLevel());

    map.on("zoomend", function() {
      loadTileLevel(getBestTileLevel());
      renderAll();
    });

    // ===== PREVOD MC SÚRADNÍC =====
    function mcToPixel(x, z) {
      const px = mapPadding + ((x - mcMinX) / (mcMaxX - mcMinX)) * mapContentWidth;
      const py = mapPadding + ((mcMaxZ - z) / (mcMaxZ - mcMinZ)) * mapContentHeight;
      return [py, px];
    }

    function pixelToMc(py, px) {
      const x = Math.round(
        mcMinX + ((px - mapPadding) / mapContentWidth) * (mcMaxX - mcMinX)
      );

      const z = Math.round(
        mcMaxZ - ((py - mapPadding) / mapContentHeight) * (mcMaxZ - mcMinZ)
      );

      return { x, z };
    }

      const region = getRegion(regionId);
      if (!region) return null;
      return states[region.stateId] || null;
    }

    function getRegionName(regionId) {
      const region = getRegion(regionId);
      return region ? region.name : "Neznámy región";
    }

    function getStateNameByRegionId(regionId) {
      const state = getStateByRegionId(regionId);
      return state ? state.name : "Neznámy štát";

    function clearLayers() {

    }

   function isPointInPolygon(x, z, points) {
  let inside = false;

  for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
    const xi = points[i].x;
    const zi = points[i].z;
    const xj = points[j].x;
    const zj = points[j].z;

    const intersect =
      ((zi > z) !== (zj > z)) &&
      (x < ((xj - xi) * (z - zi)) / (zj - zi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

function findRegionByManualPoint(x, z) {
  for (const regionId in regions) {
    const region = regions[regionId];

    if (isPointInPolygon(x, z, region.points)) {
      return regionId;
    }
  }

  return null;
}

    // ===== VIDITEĽNOSŤ PODĽA ZOOMU =====
    const ZOOM_VISIBILITY = {
      stateBorders: -5,
      regions: -2.5,
      regionLabels: -1.5,
      cities: -0.5,
      structures: 0
    };

    function zoomVisible(minZoom) {
      return map.getZoom() >= minZoom;
    }

    // ===== RENDER =====
    function renderRegions() {
      for (const regionId in regions) {
        const region = regions[regionId];
        const state = states[region.stateId];
        const color = state ? state.color : "#ffffff";
        const latlngs = region.points.map(p => mcToPixel(p.x, p.z));

        if (isChecked("toggleStates") && zoomVisible(ZOOM_VISIBILITY.stateBorders)) {
          L.polygon(latlngs, {
            color: color,
            weight: 7,
            fillOpacity: 0,
            opacity: 0.95
          }).addTo(stateBordersLayer);
        }

        if (isChecked("toggleRegions") && zoomVisible(ZOOM_VISIBILITY.regions)) {
          const polygon = L.polygon(latlngs, {
            color: color,
            weight: 2,
            fillOpacity: 0,
            opacity: 0.95
          });

        polygon.on("click", function(e) {
          L.DomEvent.stopPropagation(e);

  const mc = pixelToMc(
    e.latlng.lat,
    e.latlng.lng
  );

  L.popup()
    .setLatLng(e.latlng)
    .setContent(`
      <b>${region.name}</b><br>
      Štát: ${state ? state.name : "Neznámy štát"}<br><br>
      X: ${mc.x}<br>
      Z: ${mc.z}
    `)
    .openOn(map);

});

          polygon.addTo(regionsLayer);
        }

        if (
          isChecked("toggleRegionLabels") &&
          region.label &&
          zoomVisible(ZOOM_VISIBILITY.regionLabels)
        ) {
          L.marker(mcToPixel(region.label.x, region.label.z), {
            icon: L.divIcon({
              className: "",
              html: `<div class="region-label">${region.name}</div>`,
              iconSize: null,
              iconAnchor: [0, 0]
            }),
            interactive: false
          }).addTo(regionLabelsLayer);
        }
      }
    }

    function renderCities() {
      if (!isChecked("toggleCities")) return;

     cities.forEach(city => {
  if (!zoomVisible(city.minZoom ?? ZOOM_VISIBILITY.cities)) return;

  const autoRegionId = findRegionByManualPoint(city.x, city.z);
  const finalRegionId = autoRegionId || city.regionId;

  const marker = L.marker(mcToPixel(city.x, city.z), { icon: cityIcon });

  marker.bindPopup(`
    <b>${city.name}</b><br>
    Typ: ${city.type}<br>
    Región: ${getRegionName(finalRegionId)}<br>
    Štát: ${getStateNameByRegionId(finalRegionId)}<br>
    X: ${city.x}<br>
    Z: ${city.z}
  `);

  marker.addTo(citiesLayer);
});
    }

    function renderStructures() {
      if (!isChecked("toggleStructures")) return;

      structures.forEach(structure => {
        if (!zoomVisible(structure.minZoom ?? ZOOM_VISIBILITY.structures)) return;

        const marker = L.marker(mcToPixel(structure.x, structure.z), { icon: structureIcon });

        marker.bindPopup(`

          Typ: ${structure.type}<br>
          Región: ${getRegionName(structure.regionId)}<br>
          Štát: ${getStateNameByRegionId(structure.regionId)}<br>
          X: ${structure.x}<br>
          Z: ${structure.z}
        `);

        marker.addTo(structuresLayer);
      });
    }

      clearLayers();
      renderRegions();
      renderCities();
      renderStructures();

    function goToItem(x, z, zoom = 0) {
      const [py, px] = mcToPixel(x, z);
      map.setView([py, px], zoom);

      if (searchMarker) map.removeLayer(searchMarker);

      searchMarker = L.marker([py, px]).addTo(map)
        .bindPopup(`X: ${x}<br>Z: ${z}`)
        .openPopup();
    }

    function getRegionCenter(region) {
      let sumX = 0;
      let sumZ = 0;

      region.points.forEach(p => {
        sumX += p.x;
        sumZ += p.z;
      });

      return {
        x: Math.round(sumX / region.points.length),
        z: Math.round(sumZ / region.points.length)
      };
    }

    function buildMapList() {
      const container = document.getElementById("mapList");
      container.innerHTML = "";

      for (const stateId in states) {
        const state = states[stateId];

        const stateDetails = document.createElement("details");
        stateDetails.innerHTML = `<summary>${state.name}</summary>`;

        for (const regionId in regions) {
          const region = regions[regionId];

          if (region.stateId !== stateId) continue;

          const regionDetails = document.createElement("details");
          regionDetails.style.marginLeft = "12px";

          const center = getRegionCenter(region);

          regionDetails.innerHTML = `
            <summary>${region.name}</summary>
            <div class="list-item" data-x="${center.x}" data-z="${center.z}">
              ➜ Prejsť na región
            </div>
          `;

         const regionCities = cities.filter(c => {
  const autoRegionId = findRegionByManualPoint(c.x, c.z);
  return autoRegionId === regionId;
});
          const regionStructures = structures.filter(s => s.regionId === regionId);

          if (regionCities.length > 0) {
            const citiesBlock = document.createElement("details");
            citiesBlock.style.marginLeft = "18px";
            citiesBlock.innerHTML = `<summary>Mestá</summary>`;

            regionCities.forEach(city => {
              const div = document.createElement("div");
              div.className = "list-item";
              div.textContent = city.name;
              div.dataset.x = city.x;
              div.dataset.z = city.z;
              citiesBlock.appendChild(div);
            });

            regionDetails.appendChild(citiesBlock);
          }

          if (regionStructures.length > 0) {
            const structuresBlock = document.createElement("details");
            structuresBlock.style.marginLeft = "18px";
            structuresBlock.innerHTML = `<summary>Štruktúry</summary>`;

            regionStructures.forEach(structure => {
              const div = document.createElement("div");
              div.className = "list-item";
              div.textContent = structure.name;
              div.dataset.x = structure.x;
              div.dataset.z = structure.z;
              structuresBlock.appendChild(div);
            });

            regionDetails.appendChild(structuresBlock);
          }

          stateDetails.appendChild(regionDetails);
        }

        container.appendChild(stateDetails);
      }

      container.querySelectorAll(".list-item").forEach(item => {
        item.addEventListener("click", function() {
          const x = parseInt(this.dataset.x, 10);
          const z = parseInt(this.dataset.z, 10);

          goToItem(x, z, 0);
          document.getElementById("listPanel").classList.remove("open");
          document.getElementById("sidePanel").classList.remove("open");
        });
      });
    }
