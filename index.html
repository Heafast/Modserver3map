<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Modserver 3 mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 300px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .panel label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }

    .panel input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1d1d1d;
      color: white;
    }

    .panel input[type="checkbox"] {
      width: auto;
      margin-right: 6px;
    }

    .panel button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
    }

    .coords-box {
      margin-top: 10px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      line-height: 1.5;
    }

    .region-label,
    .state-label {
      color: white;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.75),
        -1px -1px 0 rgba(0,0,0,0.75),
        1px -1px 0 rgba(0,0,0,0.75),
        -1px 1px 0 rgba(0,0,0,0.75);
      white-space: nowrap;
      pointer-events: none;
    }

    .region-label {
      font-size: 17px;
    }

    .state-label {
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .pixel-marker {
      width: 18px;
      height: 18px;
      position: relative;
      image-rendering: pixelated;
    }

    .pixel-marker::before {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 2px solid #111;
      box-shadow:
        inset -2px -2px 0 rgba(0,0,0,0.35),
        inset 2px 2px 0 rgba(255,255,255,0.12);
    }

    .pixel-marker::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: -6px;
      width: 6px;
      height: 6px;
      background: inherit;
      border-left: 2px solid #111;
      border-bottom: 2px solid #111;
      transform: rotate(-45deg);
      box-sizing: border-box;
    }

    .marker-city {
      background: #c1121f;
    }

    .marker-structure {
      background: #163a70;
    }
  </style>
</head>

<body>
  <div class="panel">
    <h2>Modserver 3 mapa</h2>

    <label>Minecraft X</label>
    <input id="coordX" type="number" placeholder="napr. 1200">

    <label>Minecraft Z</label>
    <input id="coordZ" type="number" placeholder="napr. -3400">

    <button id="goToCoords">Prejsť na súradnice</button>
    <button id="resetView">Reset pohľadu</button>

    <div class="coords-box" id="clickedCoords">
      Klikni na mapu a ukážu sa MC súradnice.
    </div>

    <div class="coords-box">
      <strong>Filtre</strong><br>
      <label><input type="checkbox" id="toggleStates" checked> Štátne hranice</label>
      <label><input type="checkbox" id="toggleRegions" checked> Regióny</label>
      <label><input type="checkbox" id="toggleRegionLabels" checked> Názvy regiónov</label>
      <label><input type="checkbox" id="toggleCities" checked> Mestá</label>
      <label><input type="checkbox" id="toggleStructures" checked> Štruktúry</label>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ===== MAPA / TILES =====
   const imageWidth = 15104;
const imageHeight = 15104;

const tileSize = 256;
const tileCount = 59;

// skutočná Xaero mapa bez čierneho okraja
const mapContentWidth = 15008;
const mapContentHeight = 15008;
const mapPadding = 48;

const mcMinX = -7504;
const mcMaxX = 7503;
const mcMinZ = -7504;
const mcMaxZ = 7503;

    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: -5,
      maxZoom: 3,
      zoomSnap: 0.25,
      zoomDelta: 0.25,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    for (let y = 0; y < tileCount; y++) {
      for (let x = 0; x < tileCount; x++) {
        const top = y * tileSize;
        const left = x * tileSize;
        const bottom = top + tileSize;
        const right = left + tileSize;

        L.imageOverlay(
          `tiles/${x}_${tileCount - 1 - y}.jpg`,
          [[top, left], [bottom, right]]
        ).addTo(map);
      }
    }

    map.fitBounds(bounds);

    // ===== KONVERZIA MC <-> PIXEL =====
function mcToPixel(x, z) {
  const px = mapPadding + ((x - mcMinX) / (mcMaxX - mcMinX)) * mapContentWidth;
  const py = mapPadding + ((mcMaxZ - z) / (mcMaxZ - mcMinZ)) * mapContentHeight;
  return [py, px];
}

function pixelToMc(py, px) {
  const x = Math.round(
    mcMinX + ((px - mapPadding) / mapContentWidth) * (mcMaxX - mcMinX)
  );

  const z = Math.round(
    mcMaxZ - ((py - mapPadding) / mapContentHeight) * (mcMaxZ - mcMinZ)
  );

  return { x, z };
}

    // ===== ŠTÁTY =====
    const states = {
      valkyria: {
        name: "Valkýria",
        color: "#c1121f"
      },
      grankolandia: {
        name: "Grankolandia",
        color: "#e0c100"
      },
      norddeutschland: {
        name: "Norddeutschland",
        color: "#2a6fff"
      },
      neutral: {
  name: "Neutrálna oblasť",
  color: "#9a9a9a"
}
    };

    // ===== REGIÓNY =====
    // Ak chceš región presunúť do iného štátu, zmeníš iba stateId.
    const regions = {
      neutralnaOblast: {
  name: "Neutrálna oblasť",
  stateId: "neutral",
  label: { x: -1900, z: 520 },
  points: [
    { x: -2440, z: 336 }, // S01
    { x: -2184, z: 167 }, // S2
    { x: -1975, z: 143 }, // S3
    { x: -1835, z: 217 }, // S4
    { x: -1702, z: 326 }, // S5
    { x: -1649, z: 247 }, // S6
    { x: -1448, z: 132 }, // S7
    { x: -1274, z: 337 }, // S8
    { x: -1392, z: 347 }, // S9
    { x: -1457, z: 494 }, // S10
    { x: -1535, z: 619 }, // S22
    { x: -1689, z: 880 }, // S11
    { x: -1785, z: 932 }, // S12
    { x: -2197, z: 918 }, // S13
    { x: -2209, z: 764 }, // S14
    { x: -2391, z: 679 }, // S15
    { x: -2459, z: 643 }, // S16
    { x: -2464, z: 593 }, // S17
    { x: -2465, z: 406 }  // S18
  ]
}

      // Sem budeme pridávať regióny z tvojho súboru POINTS.
    };

    // ===== MESTÁ =====
    // Mesto má regionId, nie stateId.
    // Štát sa dopočíta automaticky cez región.
    const cities = [
      {
  name: "Centraltown",
  x: -1937,
  z: 266,
  type: "Mesto",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Nayray",
  x: -1533,
  z: 422,
  type: "Mesto",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Riverend",
  x: -2396,
  z: 622,
  type: "Mesto",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Havran",
  x: -1461,
  z: 221,
  type: "Mesto",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Spawn City",
  x: -1774,
  z: 813,
  type: "Mesto",
  regionId: "neutralnaOblast",
  minZoom: -2
}

      // Sem budeme pridávať mestá zo súboru CITIES.
    ];

    // ===== ŠTRUKTÚRY =====
    const structures = [
     {
  name: "Riverwatch",
  x: -2432,
  z: 486,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Small Skyline",
  x: -1969,
  z: 833,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Skyline",
  x: -2081,
  z: 848,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "The Dark Kingdom",
  x: -2096,
  z: 244,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Willie",
  x: -1583,
  z: 447,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
},
{
  name: "Millie",
  x: -2015,
  z: 449,
  type: "Štruktúra",
  regionId: "neutralnaOblast",
  minZoom: -2
}

      // Sem budeme pridávať štruktúry zo súboru STRUCTURES.
    ];

    // ===== VRSTVY =====
    const stateBordersLayer = L.layerGroup().addTo(map);
    const regionsLayer = L.layerGroup().addTo(map);
    const regionLabelsLayer = L.layerGroup().addTo(map);
    const citiesLayer = L.layerGroup().addTo(map);
    const structuresLayer = L.layerGroup().addTo(map);

    const allDynamicLayers = [
      stateBordersLayer,
      regionsLayer,
      regionLabelsLayer,
      citiesLayer,
      structuresLayer
    ];

    // ===== IKONY =====
    const cityIcon = L.divIcon({
      className: "",
      html: `<div class="pixel-marker marker-city"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    const structureIcon = L.divIcon({
      className: "",
      html: `<div class="pixel-marker marker-structure"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    // ===== POMOCNÉ FUNKCIE =====
    function getStateByRegion(regionId) {
      const region = regions[regionId];
      if (!region) return null;
      return states[region.stateId] || null;
    }

    function getRegionName(regionId) {
      return regions[regionId]?.name || "Neznámy región";
    }

    function getStateNameByRegion(regionId) {
      const state = getStateByRegion(regionId);
      return state ? state.name : "Neznámy štát";
    }

    function getStateColorByRegion(regionId) {
      const state = getStateByRegion(regionId);
      return state ? state.color : "#ffffff";
    }

    function isChecked(id) {
      return document.getElementById(id).checked;
    }

    function clearDynamicLayers() {
      allDynamicLayers.forEach(layer => layer.clearLayers());
    }

    function pointInPolygon(point, polygon) {
      const x = point.x;
      const z = point.z;
      let inside = false;

      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x;
        const zi = polygon[i].z;
        const xj = polygon[j].x;
        const zj = polygon[j].z;

        const intersect =
          ((zi > z) !== (zj > z)) &&
          (x < (xj - xi) * (z - zi) / (zj - zi) + xi);

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function findRegionForPoint(x, z) {
      for (const regionId in regions) {
        if (pointInPolygon({ x, z }, regions[regionId].points)) {
          return regionId;
        }
      }
      return null;
    }

    function ensureRegionIdForItems() {
      cities.forEach(city => {
        if (!city.regionId) {
          city.regionId = findRegionForPoint(city.x, city.z);
        }
      });

      structures.forEach(structure => {
        if (!structure.regionId) {
          structure.regionId = findRegionForPoint(structure.x, structure.z);
        }
      });
    }

    // Touto funkciou vieš presunúť región do iného štátu.
    // Napr.: changeRegionState("testRegion", "grankolandia")
    function changeRegionState(regionId, newStateId) {
      if (!regions[regionId]) {
        console.warn("Región neexistuje:", regionId);
        return;
      }

      if (!states[newStateId]) {
        console.warn("Štát neexistuje:", newStateId);
        return;
      }

      regions[regionId].stateId = newStateId;
      renderAll();
    }

    // ===== VYKRESĽOVANIE =====
    function renderRegions() {
      for (const regionId in regions) {
        const region = regions[regionId];
        const state = states[region.stateId];
        const color = state ? state.color : "#ffffff";

        const latlngs = region.points.map(p => mcToPixel(p.x, p.z));

        // Hrubšia štátna hranica pod regiónom
        if (isChecked("toggleStates")) {
          L.polygon(latlngs, {
            color: color,
            weight: 7,
            fillOpacity: 0,
            opacity: 0.95
          }).addTo(stateBordersLayer);
        }

        // Tenká hranica regiónu
        if (isChecked("toggleRegions")) {
          const polygon = L.polygon(latlngs, {
            color: color,
            weight: 2,
            fillOpacity: 0,
            opacity: 0.95
          });

          polygon.bindPopup(`
            <b>${region.name}</b><br>
            Región ID: ${regionId}<br>
            Štát: ${state ? state.name : "Neznámy štát"}
          `);

          polygon.addTo(regionsLayer);
        }

        if (isChecked("toggleRegionLabels") && region.label) {
          const label = L.marker(mcToPixel(region.label.x, region.label.z), {
            icon: L.divIcon({
              className: "",
              html: `<div class="region-label">${region.name}</div>`,
              iconSize: [220, 28],
              iconAnchor: [110, 14]
            }),
            interactive: false
          });

          label.addTo(regionLabelsLayer);
        }
      }
    }

    function renderCities() {
      if (!isChecked("toggleCities")) return;

      cities.forEach(city => {
        const marker = L.marker(mcToPixel(city.x, city.z), { icon: cityIcon });

        marker.bindPopup(`
          <b>${city.name}</b><br>
          Typ: ${city.type}<br>
          Región: ${getRegionName(city.regionId)}<br>
          Štát: ${getStateNameByRegion(city.regionId)}<br>
          X: ${city.x}<br>
          Z: ${city.z}
        `);

        marker.addTo(citiesLayer);
      });
    }

    function renderStructures() {
      if (!isChecked("toggleStructures")) return;

      structures.forEach(structure => {
        const marker = L.marker(mcToPixel(structure.x, structure.z), { icon: structureIcon });

        marker.bindPopup(`
          <b>${structure.name}</b><br>
          Typ: ${structure.type}<br>
          Región: ${getRegionName(structure.regionId)}<br>
          Štát: ${getStateNameByRegion(structure.regionId)}<br>
          X: ${structure.x}<br>
          Z: ${structure.z}
        `);

        marker.addTo(structuresLayer);
      });
    }

    function renderAll() {
      clearDynamicLayers();
      ensureRegionIdForItems();
      renderRegions();
      renderCities();
      renderStructures();
    }

    // ===== KLIK NA MAPU =====
    let searchMarker = null;

    map.on("click", function(e) {
      const mc = pixelToMc(e.latlng.lat, e.latlng.lng);
      const regionId = findRegionForPoint(mc.x, mc.z);
      const regionName = regionId ? getRegionName(regionId) : "Mimo regiónu";
      const stateName = regionId ? getStateNameByRegion(regionId) : "Mimo štátu";

      document.getElementById("clickedCoords").innerHTML =
        `<strong>Posledný klik:</strong><br>
         X: ${mc.x}<br>
         Z: ${mc.z}<br>
         Región: ${regionName}<br>
         Štát: ${stateName}`;

      if (searchMarker) map.removeLayer(searchMarker);

      searchMarker = L.marker(e.latlng).addTo(map)
        .bindPopup(`
          X: ${mc.x}<br>
          Z: ${mc.z}<br>
          Región: ${regionName}<br>
          Štát: ${stateName}
        `)
        .openPopup();
    });

    document.getElementById("goToCoords").addEventListener("click", function() {
      const x = parseInt(document.getElementById("coordX").value, 10);
      const z = parseInt(document.getElementById("coordZ").value, 10);

      if (isNaN(x) || isNaN(z)) {
        alert("Zadaj platné X a Z.");
        return;
      }

      const [py, px] = mcToPixel(x, z);
      const regionId = findRegionForPoint(x, z);
      const regionName = regionId ? getRegionName(regionId) : "Mimo regiónu";
      const stateName = regionId ? getStateNameByRegion(regionId) : "Mimo štátu";

      map.setView([py, px], 0);

      if (searchMarker) map.removeLayer(searchMarker);

      searchMarker = L.marker([py, px]).addTo(map)
        .bindPopup(`
          X: ${x}<br>
          Z: ${z}<br>
          Región: ${regionName}<br>
          Štát: ${stateName}
        `)
        .openPopup();
    });

    document.getElementById("resetView").addEventListener("click", function() {
      map.fitBounds(bounds);
    });

    document.getElementById("toggleStates").addEventListener("change", renderAll);
    document.getElementById("toggleRegions").addEventListener("change", renderAll);
    document.getElementById("toggleRegionLabels").addEventListener("change", renderAll);
    document.getElementById("toggleCities").addEventListener("change", renderAll);
    document.getElementById("toggleStructures").addEventListener("change", renderAll);

    renderAll();
  </script>
</body>
</html>
